<!-- src\components\ModalImprovementModal\modal-improvement-modal.html -->
<div id="modal-improvement-backdrop" class="fixed inset-0 bg-black bg-opacity-80 z-[60] hidden justify-center items-center backdrop-blur-sm transition-opacity duration-300">
    <div id="modal-improvement-modal" class="bg-gray-800 rounded-xl shadow-2xl w-11/12 max-w-lg border border-gray-700 transform scale-95 opacity-0 transition-all duration-300 flex flex-col max-h-[90vh]">
        
        <!-- Header -->
        <div class="flex justify-between items-center p-5 border-b border-gray-700 bg-gray-800/50 rounded-t-xl">
            <div class="flex items-center gap-3">
                <div class="bg-yellow-500/20 p-2 rounded-lg text-yellow-400">
                    <i class="fa-solid fa-flag"></i>
                </div>
                <h3 class="text-xl font-bold text-white">Improve Modal</h3>
            </div>
            <button id="modal-improvement-close-btn" class="text-gray-400 hover:text-white transition-colors p-1 rounded-lg hover:bg-gray-700">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <!-- Body -->
        <div class="p-6 overflow-y-auto custom-scrollbar">
            <form id="modal-improvement-form" class="space-y-5">
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label for="modal-improvement-notes" class="block text-sm font-medium text-gray-300">
                            Improvement Notes & Suggestions
                        </label>
                        <button type="button" id="modal-toggle-expand-btn" class="text-gray-400 hover:text-white transition-colors" title="Toggle Fullscreen Text">
                            <i class="fa-solid fa-expand"></i>
                        </button>
                    </div>
                    <textarea 
                        id="modal-improvement-notes" 
                        name="user_comment" 
                        rows="5" 
                        class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent transition-all resize-none"
                        placeholder="Write your feedback here (e.g., 'Add an example for the negative form', 'The explanation is confusing')..."
                    ></textarea>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="p-5 border-t border-gray-700 bg-gray-800/50 rounded-b-xl flex justify-between items-center">
            <button type="button" id="modal-improvement-remove-btn" class="px-4 py-2 bg-red-900/50 hover:bg-red-800 text-red-300 rounded-lg transition-colors flex items-center hidden border border-red-800/50">
                <i class="fa-solid fa-trash-can mr-2"></i> Remove Note
            </button>
            
            <div class="flex gap-3 ml-auto">
                <button type="button" id="modal-improvement-cancel-btn" class="px-4 py-2 text-gray-300 hover:text-white hover:bg-gray-700 rounded-lg transition-colors">
                    Cancel
                </button>
                <button type="submit" form="modal-improvement-form" class="px-6 py-2 bg-yellow-600 hover:bg-yellow-500 text-white font-semibold rounded-lg shadow-lg hover:shadow-yellow-500/20 transition-all flex items-center">
                    <i class="fa-solid fa-save mr-2"></i> Save Note
                </button>
            </div>
        </div>
    </div>
</div>
